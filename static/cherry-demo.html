<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry Markdown 编辑器示例</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Cherry Markdown 编辑器 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cherry-markdown@0.8.38/dist/cherry-markdown.min.css">
    <script src="https://cdn.jsdelivr.net/npm/cherry-markdown@0.8.38/dist/cherry-markdown.min.js"></script>
    
    <style>
        .cherry-markdown {
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
        }
        .cherry {
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Cherry Markdown 编辑器集成示例</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 周进展编辑器 -->
            <div class="bg-white rounded-lg shadow-sm p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">
                    <i class="fas fa-calendar-week text-blue-500 mr-2"></i>
                    本周进展
                </h2>
                <div id="weekly-progress-editor" class="mb-4"></div>
                <button onclick="getWeeklyProgress()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                    <i class="fas fa-save mr-2"></i>保存进展
                </button>
            </div>
            
            <!-- 整体进展编辑器 -->
            <div class="bg-white rounded-lg shadow-sm p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">
                    <i class="fas fa-chart-line text-green-500 mr-2"></i>
                    整体进展
                </h2>
                <div id="overall-progress-editor" class="mb-4"></div>
                <button onclick="getOverallProgress()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors">
                    <i class="fas fa-save mr-2"></i>保存进展
                </button>
            </div>
            
            <!-- 风险和问题编辑器 -->
            <div class="bg-white rounded-lg shadow-sm p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">
                    <i class="fas fa-exclamation-triangle text-red-500 mr-2"></i>
                    风险和问题
                </h2>
                <div id="risks-editor" class="mb-4"></div>
                <button onclick="getRisks()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                    <i class="fas fa-save mr-2"></i>保存风险
                </button>
            </div>
            
            <!-- 下周计划编辑器 -->
            <div class="bg-white rounded-lg shadow-sm p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">
                    <i class="fas fa-tasks text-purple-500 mr-2"></i>
                    下周计划
                </h2>
                <div id="next-week-editor" class="mb-4"></div>
                <button onclick="getNextWeek()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
                    <i class="fas fa-save mr-2"></i>保存计划
                </button>
            </div>
        </div>
        
        <!-- 简化版编辑器示例 -->
        <div class="mt-8 bg-white rounded-lg shadow-sm p-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">
                <i class="fas fa-lightbulb text-yellow-500 mr-2"></i>
                快速记录（简化版编辑器）
            </h2>
            <div id="quick-note-editor" class="mb-4"></div>
            <button onclick="getQuickNote()" class="px-4 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-700 transition-colors">
                <i class="fas fa-save mr-2"></i>保存笔记
            </button>
        </div>
    </div>

    <script>
        // 存储编辑器实例
        const editors = {};

        // 初始化所有编辑器
        document.addEventListener('DOMContentLoaded', function() {
            // 周进展编辑器（全功能）
            editors.weekly = new Cherry({
                id: 'weekly-progress-editor',
                value: '# 本周进展\n\n## 完成的工作\n- 完成了功能A的开发\n- 修复了3个bug\n\n## 遇到的问题\n暂无\n\n## 下一步计划\n继续优化性能',
                editor: {
                    defaultModel: 'edit&preview',
                    height: '400px',
                },
                toolbars: {
                    theme: 'light',
                    showToolbar: true,
                    toolbar: [
                        'bold',
                        'italic',
                        'strikethrough',
                        '|',
                        'color',
                        'header',
                        '|',
                        'list',
                        {
                            insert: [
                                'image',
                                'link',
                                'hr',
                                'code',
                                'table',
                            ],
                        },
                        '|',
                        'undo',
                        'redo',
                    ],
                },
                fileUpload: uploadImage,
            });

            // 整体进展编辑器（全功能）
            editors.overall = new Cherry({
                id: 'overall-progress-editor',
                value: '# 整体进展概览\n\n当前项目进度：**80%**\n\n## 已完成\n- ✅ 需求分析\n- ✅ 技术方案设计\n- ✅ 核心功能开发\n\n## 进行中\n- 🔄 性能优化\n- 🔄 测试用例编写',
                editor: {
                    defaultModel: 'edit&preview',
                    height: '400px',
                },
                toolbars: {
                    theme: 'light',
                    showToolbar: true,
                    toolbar: [
                        'bold',
                        'italic',
                        'strikethrough',
                        '|',
                        'color',
                        'header',
                        '|',
                        'list',
                        {
                            insert: [
                                'image',
                                'link',
                                'hr',
                                'code',
                                'table',
                            ],
                        },
                        '|',
                        'undo',
                        'redo',
                    ],
                },
                fileUpload: uploadImage,
            });

            // 风险和问题编辑器（中等功能）
            editors.risks = new Cherry({
                id: 'risks-editor',
                value: '## ⚠️ 当前风险\n\n1. **性能问题**：大数据量下响应较慢\n   - 影响：用户体验下降\n   - 解决方案：优化查询算法\n\n2. **依赖库版本**：某个依赖库即将停止维护\n   - 影响：安全隐患\n   - 解决方案：寻找替代方案',
                editor: {
                    defaultModel: 'edit&preview',
                    height: '400px',
                },
                toolbars: {
                    theme: 'light',
                    showToolbar: true,
                    toolbar: [
                        'bold',
                        'italic',
                        '|',
                        'color',
                        'header',
                        '|',
                        'list',
                        'link',
                        '|',
                        'undo',
                        'redo',
                    ],
                },
                fileUpload: uploadImage,
            });

            // 下周计划编辑器（中等功能）
            editors.nextWeek = new Cherry({
                id: 'next-week-editor',
                value: '# 下周工作计划\n\n## 主要任务\n1. 完成性能优化\n2. 编写单元测试\n3. 准备上线文档\n\n## 预计工时\n约 3 人天\n\n## 需要协调的资源\n- 测试环境\n- 运维支持',
                editor: {
                    defaultModel: 'edit&preview',
                    height: '400px',
                },
                toolbars: {
                    theme: 'light',
                    showToolbar: true,
                    toolbar: [
                        'bold',
                        'italic',
                        '|',
                        'header',
                        '|',
                        'list',
                        'link',
                        '|',
                        'undo',
                        'redo',
                    ],
                },
                fileUpload: uploadImage,
            });

            // 快速笔记编辑器（简化版）
            editors.quickNote = new Cherry({
                id: 'quick-note-editor',
                value: '快速记录一些想法...',
                editor: {
                    defaultModel: 'editOnly',
                    height: '200px',
                },
                toolbars: {
                    theme: 'light',
                    showToolbar: true,
                    toolbar: [
                        'bold',
                        'italic',
                        '|',
                        'list',
                        'link',
                        '|',
                        'undo',
                        'redo',
                    ],
                },
            });
        });

        // 获取编辑器内容的函数
        function getWeeklyProgress() {
            const content = editors.weekly.getValue();
            alert('周进展内容：\n' + content);
            console.log('周进展:', content);
        }

        function getOverallProgress() {
            const content = editors.overall.getValue();
            alert('整体进展内容：\n' + content);
            console.log('整体进展:', content);
        }

        function getRisks() {
            const content = editors.risks.getValue();
            alert('风险和问题：\n' + content);
            console.log('风险:', content);
        }

        function getNextWeek() {
            const content = editors.nextWeek.getValue();
            alert('下周计划：\n' + content);
            console.log('下周计划:', content);
        }

        function getQuickNote() {
            const content = editors.quickNote.getValue();
            alert('快速笔记：\n' + content);
            console.log('快速笔记:', content);
        }

        // 图片上传函数（示例）
        function uploadImage(file, callback) {
            // 这里应该调用实际的上传API
            console.log('上传图片:', file.name);
            
            // 模拟上传
            setTimeout(() => {
                // 返回一个示例图片URL
                callback('https://via.placeholder.com/400x300?text=' + encodeURIComponent(file.name));
            }, 1000);
        }
    </script>
</body>
</html>
